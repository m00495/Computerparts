<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="blue.png">
<title>قائمة الأسامي</title>
<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* -- جميع الأنماط السابقة تبقى كما هي -- */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --surface: #fffdf7;
    --border: #d6c9a8;
    --text: #2c2416;
    --muted: #7a6a4f;
    --accent: #5688a8;
    --accent-light: #eaf2df;
    --accent-hover: #304166;
    --maps: #1356ad;
    --maps-hover: #1558b0;
    --shadow: rgba(44, 36, 22, 0.08);
  }

  body {
    font-family: 'El Messiri', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--accent);
    padding: 2rem 2rem 1.5rem;
    text-align: center;
  }

  header h1 {
    font-size: 1.8rem;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.01em;
    margin-bottom: 0.25rem;
  }

  header p {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.75);
  }

  .search-wrap {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 2rem;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .search-inner {
    max-width: 720px;
    margin: 0 auto;
    position: relative;
  }

  .search-icon {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  #searchInput {
    width: 100%;
    padding: 0.75rem 2.8rem 0.75rem 1rem;
    font-size: 1rem;
    font-family: inherit;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #searchInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(90,122,58,0.15);
    background: #fff;
  }

  #searchInput::placeholder { color: var(--muted); }

  .stats {
    max-width: 720px;
    margin: 1.25rem auto 0.5rem;
    padding: 0 0.25rem;
    font-size: 0.82rem;
    color: var(--muted);
  }

  .list {
    max-width: 720px;
    margin: 0 auto;
    padding: 0.5rem 2rem 3rem;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    transition: box-shadow 0.18s, transform 0.18s;
    animation: fadeUp 0.25s ease both;
  }

  .card:hover {
    box-shadow: 0 4px 16px var(--shadow);
    transform: translateY(-1px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-left {
    display: flex;
    align-items: center;
    gap: 0.9rem;
    min-width: 0;
    flex: 1;
  }

  .subtitle {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 3px;
    font-style: italic;
    opacity: 0.75;
  }

  .info { min-width: 0; }

  .name {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .location {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .location svg { vertical-align: middle; margin-left: 3px; }

  .btn-map {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0.5rem 1rem;
    background: var(--maps);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background 0.18s, transform 0.12s;
  }

  .btn-map:hover { background: var(--maps-hover); }
  .btn-map:active { transform: scale(0.97); }

  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
    display: none;
  }

  .empty svg { display: block; margin: 0 auto 1rem; opacity: 0.35; }
  .empty p { font-size: 1rem; }

  .footer-section {
    max-width: 720px;
    margin: 0 auto 3rem;
    padding: 1.5rem 2rem;
    border-top: 1px dashed var(--border);
    color: var(--muted);
    font-size: 0.9rem;
    text-align: center;
    font-style: italic;
    opacity: 0.7;
  }

  mark {
    background: #fff3a3;
    border-radius: 3px;
    padding: 0 1px;
    color: var(--text);
  }

  /* --- أنماط أزرار الحالة الجديدة --- */
  .status-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 85px;
    padding: 0.4rem 1rem;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: default;
    transition: background 0.2s, color 0.2s, filter 0.2s;
    user-select: none;
  }

  .status-badge.visited {
    background: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
  }

  .status-badge.not-visited {
    background: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
  }

  /* عندما يدخل الموظفون كلمة المرور، نجعل المؤشر يتحول إلى يد */
  body.editable .status-badge {
    cursor: pointer;
  }

  body.editable .status-badge:hover {
    filter: brightness(0.93);
  }

  /* قسم كلمة المرور */
  .password-section {
    max-width: 720px;
    margin: 1.5rem auto 0;
    padding: 0.5rem 2rem;
    text-align: center;
  }

  .password-section input[type="password"] {
    padding: 0.5rem;
    font-family: inherit;
    font-size: 0.9rem;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    width: 160px;
    margin-left: 0.5rem;
  }

  .password-section button {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 0.5rem 1.2rem;
    font-family: inherit;
    font-size: 0.9rem;
    cursor: pointer;
  }

  .password-section button:hover {
    background: var(--accent-hover);
  }

  @media (max-width: 540px) {
    header { padding: 1.5rem 1rem 1.2rem; }
    header h1 { font-size: 1.4rem; }
    .search-wrap { padding: 1rem; }
    .list { padding: 0.5rem 1rem 3rem; }
    .btn-map span { display: none; }
    .btn-map { padding: 0.5rem 0.7rem; }
    .password-section { padding: 0.5rem 1rem; }
  }
</style>
</head>
<body>

<header>
  <h1>دليلك للأسامي</h1>
  <p>ابحث عن راعي المزرعة وافتح موقعها بضغطة "هنا"</p>
</header>

<!-- قسم كلمة المرور للموظفين -->
<div class="password-section" id="passwordSection">
  <input type="password" id="empPassword" placeholder="رمز الموظفين">
  <button onclick="attemptLogin()">دخول</button>
  <span id="loginError" style="color:red; font-size:0.85rem; display:block; margin-top:5px;"></span>
</div>

<div class="search-wrap">
  <div class="search-inner">
    <svg class="search-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="searchInput" placeholder="ابحث عن اسم الراعي المزرعة..." autocomplete="off" />
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="list" id="list"></div>

<div class="footer-section"></div>

<div class="empty" id="empty">
  <svg width="56" height="56" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    <line x1="8" y1="11" x2="14" y2="11"/><line x1="11" y1="8" x2="11" y2="14"/>
  </svg>
  <p>ما لقينا نتائج — جرب اسم ثاني</p>
</div>

<script>
// ========== استبدل هذا الرابط برابط تطبيق الويب الخاص بك من Apps Script ==========
const API_URL = 'https://script.google.com/macros/s/AKfycby.../exec'; // <-- ضع رابطك هنا
// ================================================================================

const PASSWORD = '12345'; // غيّر كلمة المرور إلى ما تريد مشاركته مع الموظفين
let isEditing = false;      // تصبح true بعد إدخال كلمة المرور الصحيحة

// بيانات المزارع
const farmers = [
  { id: 1, name: "سعود عبد العزيز الرفين",   farm: "مزرعة العتيبي",    area: "",       lat: 22.238749 , lng: 46.775326 },
  { id: 2, name: "ورثة ناجي شايع الرمان",    farm: "مزرعة الوادي",     area: "",              lat: 22.239825, lng: 46.773673 },
  { id: 3, name: "محمد عبد الله يحيى البواردي",      farm: "مزرعة النخيل",     area: "",          lat: 22.22442, lng: 46.77877 },
  { id: 4, name: "ورثة مبارك عبد الله الخرعان", farm: "مزرعة الدوسري",  area: "  ",    lat: 22.224773, lng: 46.780029 },
  { id: 5, name: "قينان عباس ال عمار",     farm: "مزرعة الجبل",      area: "",               lat: 22.225637, lng: 46.779094 },
  { id: 6, name: "صالح مسفر الفواز",     farm: "مزرعة الجبل",      area: "",               lat: 22.223170, lng: 46.779222 },
  { id: 7, name: "ورثة سعود شافي الرشود",     farm: "مزرعة الجبل",      area: "",               lat: 22.246089, lng: 46.773141 },
  { id: 8, name: "الدرداح هندي منصور الرشود",     farm: "مزرعة الجبل",      area: "",               lat: 22.243854, lng: 46.773435 },
  { id: 9, name: "ورثة ابراهيم سعود الرشود",     farm: "مزرعة الجبل",      area: "",               lat: 22.243901, lng: 46.772916 },
  { id:10, name:"شايع تميم محمد ال عمار",     farm: "مزرعة الجبل",      area: "",               lat: 22.224486, lng: 46.780675 },
  { id:11, name: "ورثة ابراهيم حمود الجرفين",     farm: "مزرعة الجبل",      area: "",               lat: 22.241019, lng: 46.770277 },
  { id:12, name: "ورثة تميم رشود العنيزان",     farm: "مزرعة الجبل",      area: "",               lat: 22.242497, lng: 46.776967 },
  { id:13, name: "ورثة عبد الهادي عنبر المقابله",     farm: "مزرعة الجبل",      area: "",               lat: 22.223485, lng: 46.782705 },
  { id:14, name: "عبد الرحمن سالم العبد الهادي",     farm: "مزرعة الجبل",      area: "",               lat: 22.241422, lng: 46.776140 },
  { id:15, name: "ورثة تميم محمد ال عمار",     farm: "مزرعة الجبل",      area: "",               lat: 22.224486, lng: 46.780675 },
  { id:16, name: "درعان مسلم العبد الهادي",     farm: "مزرعة الجبل",      area: "",               lat: 22.224901, lng: 46.780722 }
];

// دالة تسجيل الدخول
function attemptLogin() {
  const pw = document.getElementById('empPassword').value;
  const error = document.getElementById('loginError');
  if (pw === PASSWORD) {
    isEditing = true;
    document.body.classList.add('editable'); // إضافة كلاس للـ body ليظهر المؤشر كيد عند الحالة
    document.getElementById('passwordSection').style.display = 'none';
    error.textContent = '';
    // إعادة عرض القائمة مع تفعيل التعديل
    render(document.getElementById('searchInput').value);
  } else {
    error.textContent = 'رمز خاطئ – حاول مرة أخرى.';
  }
}

// --- دوال التعامل مع Google Sheets ---
async function fetchVisits() {
  try {
    const response = await fetch(API_URL);
    const data = await response.json();
    return data; // مصفوفة { id, name, visited }
  } catch (e) {
    console.error('فشل جلب حالات الزيارة', e);
    return [];
  }
}

async function updateVisitInSheet(farmId, visited) {
  try {
    await fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors', // ضروري لتجنب مشاكل CORS
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: farmId, visited: visited })
    });
  } catch (e) {
    console.error('فشل الام', e);
  }
}

let visitsMap = {}; // لتخزين حالات الزيارة القادمة من Google Sheets

function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);
}

function openMaps(lat, lng, name) {
  const url = `https://www.google.com/maps?q=${lat},${lng}&z=15&hl=ar`;
  window.open(url, '_blank');
}

function render(query) {
  const q = query.trim();
  const filtered = q
    ? farmers.filter(f =>
        f.name.includes(q) || f.farm.includes(q) || f.area.includes(q)
      )
    : farmers;

  const list = document.getElementById('list');
  const empty = document.getElementById('empty');
  const stats = document.getElementById('stats');

  list.innerHTML = '';

  if (filtered.length === 0) {
    empty.style.display = 'block';
    stats.textContent = '';
    return;
  }

  empty.style.display = 'none';
  stats.textContent = `${filtered.length} من أصل ${farmers.length}`;

  filtered.forEach((f, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${i * 30}ms`;

    const visited = visitsMap[f.id] === true; // true/false من الجدول

    card.innerHTML = `
      <div class="card-left">
        <div class="info">
          <div class="name">${highlight(f.name, q)}</div>
          <div class="location">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
              <circle cx="12" cy="9" r="2.5"/>
            </svg>
            ${f.area}
          </div>
        </div>
      </div>
      <div style="display: flex; align-items: center; gap: 0.75rem;">
        <span class="status-badge ${visited ? 'visited' : 'not-visited'}" data-id="${f.id}">${visited ? 'تم' : 'لم يتم'}</span>
        <button class="btn-map" onclick="openMaps(${f.lat}, ${f.lng}, '${f.name}')">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
          <span>هنا</span>
        </button>
      </div>
    `;
    list.appendChild(card);
  });

  // إضافة مستمعي الأحداث لأزرار الحالة (تعمل فقط إذا isEditing == true)
  document.querySelectorAll('.status-badge').forEach(badge => {
    badge.addEventListener('click', async function() {
      if (!isEditing) return; // لا تفعل شيء إذا لم يتم تسجيل الدخول
      const farmId = parseInt(this.dataset.id);
      const currentVisited = visitsMap[farmId] === true;
      const newVisited = !currentVisited;

      // تحديث المظهر فوراً
      this.classList.toggle('visited', newVisited);
      this.classList.toggle('not-visited', !newVisited);
      this.textContent = newVisited ? 'ترشيد' : 'لم يتم';

      // تحديث الخريطة المحلية
      visitsMap[farmId] = newVisited;

      // إرسال التحديث إلى Google Sheets
      await updateVisitInSheet(farmId, newVisited);
    });
  });
}

// ========== تشغيل الصفحة ==========
(async function init() {
  // جلب حالات الزيارة من Google Sheets
  const visitsData = await fetchVisits();
  visitsData.forEach(v => { visitsMap[v.id] = v.visited; });

  // عرض القائمة لأول مرة (بدون كلمة مرور، المربعات غير قابلة للتعديل)
  render('');

  // ربط البحث
  document.getElementById('searchInput').addEventListener('input', e => render(e.target.value));
})();
</script>
</body>
</html>
